<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رسالة العيد ❤️</title>

<style>
body {
  margin: 0;
  padding: 0;
  height: 100vh;
  font-family: Arial, sans-serif;
  direction: rtl;
  overflow: hidden;

  background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #fbc2eb, #a18cd1);
  background-size: 400% 400%;
  animation: gradientMove 12s ease infinite;

  display: flex;
  justify-content: center;
  align-items: center;
}

@keyframes gradientMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

.flower {
  position: absolute;
  top: -50px;
  font-size: 24px;
  animation: fall linear infinite;
  opacity: 0.8;
}

@keyframes fall {
  0% { transform: translateY(-10vh) rotate(0deg); }
  100% { transform: translateY(110vh) rotate(360deg); }
}

.box {
  background: rgba(255,255,255,0.9);
  padding: 35px;
  border-radius: 25px;
  width: 90%;
  max-width: 450px;
  text-align: center;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  animation: pop 1s ease;
  backdrop-filter: blur(8px);
}

@keyframes pop {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

h2 { color: #ff2e6a; }

input {
  width: 80%;
  padding: 12px;
  border-radius: 12px;
  border: 2px solid #ffb6c1;
  font-size: 18px;
  text-align: center;
  outline: none;
}

input:focus {
  border-color: #ff2e6a;
  box-shadow: 0 0 10px rgba(255,46,106,0.3);
}

button {
  margin-top: 15px;
  padding: 12px 25px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(45deg, #ff4f81, #ff2e6a);
  color: white;
  font-size: 18px;
  cursor: pointer;
}

#message {
  margin-top: 25px;
  font-size: 20px;
  color: #d6336c;
  line-height: 2;
  display: none;
  opacity: 0;
  transform: translateY(10px);
  transition: 0.6s ease;
}

#message.show {
  opacity: 1;
  transform: translateY(0);
}
</style>
</head>

<body>

<script>
for(let i=0;i<12;i++){
  let f = document.createElement("div");
  f.className = "flower";
  f.innerHTML = "🌸";
  f.style.left = Math.random()*100 + "vw";
  f.style.animationDuration = (5 + Math.random()*5) + "s";
  f.style.fontSize = (16 + Math.random()*20) + "px";
  document.body.appendChild(f);
}
</script>

<div class="box">
  <h2>❤️ اكتبي الباسورد ❤️</h2>

  <input type="password" id="password" placeholder="الباسورد">

  <br>

  <button onclick="checkPassword()">فتح الرسالة</button>

  <div id="message">
    كل سنة وانتي أجمل عيد في حياتي ❤️<br><br>
    يمكن الظروف مخلّينا بعيد، بس انتي دايمًا في قلبي ❤️<br><br>
    ربنا يحفظك ليا ويجمعنا على خير ✨
  </div>
</div>

<script>
function checkPassword() {
  let pass = document.getElementById("password").value;

  if(pass === "عيد_سعيد") {
    let msg = document.getElementById("message");
    msg.style.display = "block";
    setTimeout(() => msg.classList.add("show"), 50);
  } else {
    alert("الباسورد غلط 💔");
  }
}
</script>

</body>
</html>
